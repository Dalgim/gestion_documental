<!DOCTYPE html>
<html>
    <head>
        <title>Sistema de Gestión Documental</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/menu.css') }}">
    </head>
    <body>

        <div class="layout">

            <aside class="sidebar">

                <div class="sidebar-logo">

                    <h2>CONTRATOS</h2>

                </div>

                <nav>

                    <a href="{{ url_for('inicio') }}">
                        Inicio
                    </a>

                    <a href="{{ url_for('clientes') }}">
                        Clientes
                    </a>

                    <a href="{{ url_for('proyectos') }}">
                        Proyectos
                    </a>

                    <a href="{{ url_for('trabajadores') }}">
                        Trabajadores
                    </a>

                    <a href="{{ url_for('contratos') }}">
                        Contratos
                    </a>

                    <a href="{{ url_for('logout') }}">
                        Cerrar Sesión
                    </a>

                </nav>

            </aside>

            <main class="content">

                <header class="topbar">

                    <span>
                        Bienvenido {{ current_user.nombre }}
                    </span>

                </header>

                <section class="page-content">

                    {% block content %}
                    {% endblock %}

                </section>

            </main>

        </div>

        

    </body>
</html>
