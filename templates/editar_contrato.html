{% extends 'base.html' %}

{% block content %}

    <div class="form-container">

        <div class="form-title">

            <h1>Editar Contrato</h1>
            <p>Actualización de información del contrato</p>

        </div>

        <div class="form-card">

            <form method="POST">

                <div class="form-grid">

                    <div class="section-title full-width">
                        Información General
                    </div>

                    <!-- CLIENTE -->

                    <div class="form-group">

                        <label>Cliente</label>

                        <select name="cliente_id" required>

                            {% for cliente in clientes %}

                            <option value="{{ cliente.id }}"
                                {% if cliente.id == contrato.cliente_id %}
                                    selected
                                {% endif %}>

                                {{ cliente.nombre_cliente }}

                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <!-- SERVICIO -->

                    <div class="form-group">

                        <label>Servicio Especializado</label>

                        <select name="proyecto_id" required>

                            {% for proyecto in proyectos %}

                            <option value="{{ proyecto.id }}"
                                {% if proyecto.id == contrato.proyecto_id %}
                                    selected
                                {% endif %}>

                                {{ proyecto.nombre_proyecto }}

                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <!-- FECHA INICIO -->

                    <div class="form-group">

                        <label>Fecha Inicio</label>
                        <input type="date" name="fecha_inicio" value="{{ contrato.fecha_inicio.strftime('%Y-%m-%d') }}" required>

                    </div>

                    <!-- FECHA FIN -->

                    <div class="form-group">

                        <label>Fecha Fin</label>
                        <input type="date" name="fecha_fin" value="{{ contrato.fecha_fin.strftime('%Y-%m-%d') }}" required>

                    </div>

                    <!-- MONTO -->

                    <div class="form-group">

                        <label>Monto</label>
                        <input type="text" name="monto" value="{{ contrato.monto if contrato.monto is not none else '' }}">

                    </div>

                    <!-- FORMA PAGO -->

                    <div class="form-group">

                        <label>Forma de Pago</label>
                        <input type="text" class="mayusculas" name="forma_pago" value="{{ contrato.forma_pago }}" required>

                    </div>

                    <!-- EMPRESA -->

                    <div class="form-group">

                        <label>Empresa Prestadora</label>
                        <input type="text" value="{{ contrato.nom_empresa }}" readonly>

                    </div>

                    <!-- VIGENCIA -->

                    <div class="form-group">

                        <label>Vigencia</label>
                        <input type="text" value="{{ contrato.vigencia }}" readonly>

                    </div>

                    <div class="form-group full-width">
                        <label>Trabajadores asignados</label>

                        <select name="trabajadores" multiple size="10">
                            {% for trabajador in trabajadores %}

                                <option
                                    value="{{ trabajador.id }}"
                                    {% if trabajador in contrato.trabajadores %}
                                        selected
                                    {% endif %}
                                >
                                    {{ trabajador.nombre_trabajador }}

                                </option>

                            {% endfor %}
                        </select>

                        <small>
                            Mantén presionada la tecla CTRL para seleccionar varios trabajadores.
                        </small>

                    </div>

                </div>

                <div class="form-actions">

                    <a href="{{ url_for('contratos') }}" class="btn-secondary">
                        Volver
                    </a>

                    <button type="submit" class="btn-primary">
                        Guardar Cambios
                    </button>

                </div>

            </form>

        </div>

    </div>

{% endblock %}
